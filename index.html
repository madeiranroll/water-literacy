<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discern Like A Rebel — Smashing The Toxins Out Of The Way</title>
<meta name="description" content="Ruthlessly curated swaps, education, and consultancy across water, supplements, home and more. By Natalie."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Raleway:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --rebel:#962D49; --rebel-lt:#B83858; --rebel-dk:#5C1828; --rebel-glow:rgba(150,45,73,.28);
  --near-black:#0E090C; --surface:#180D12; --card:#221318; --elevated:#2E1A22;
  --rose:#D46882; --rose-lt:#E8B4C4; --rose-gold:#C4929C; --mauve:#8C5068;
  --text:#EDE0E6; --text-dim:#C0A8B4; --text-soft:#6B4A58;
  --border:rgba(150,45,73,.2); --border-lt:rgba(237,224,230,.1);
  --water-link:#5A7FA8;
  --teal-dk:#071418; --teal:#1A506A; --wave:#2D7A96; --foam:#7BBDD1; --mist:#B4D6E3;
  --ink:#071418; --ocean:#112d40;
  --ff-disp:'Playfair Display',Georgia,serif;
  --ff-body:'Cormorant Garamond',Georgia,serif;
  --ff-ui:'Raleway',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
html{font-size:18px}
body{font-family:var(--ff-body);background:var(--near-black);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:21px;line-height:1.75}
img{max-width:100%;display:block} a{color:inherit;text-decoration:none} button{cursor:pointer;font-family:inherit}
h1,h2,h3,h4{font-family:var(--ff-disp);font-weight:400;line-height:1.1}
.label{font-family:var(--ff-ui);font-size:.62rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--rose-gold)}
.label--rebel{color:var(--rebel)}
.container{max-width:1080px;margin:0 auto;padding:0 2rem}
.narrow{max-width:740px;margin:0 auto;padding:0 2rem}
section{padding:6rem 0}

/* BRAND BAR */
.brand-bar{background:var(--rebel);height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;position:fixed;top:0;left:0;right:0;z-index:300}
.brand-bar__name{font-family:var(--ff-ui);font-size:.6rem;font-weight:800;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.95)}
.brand-bar__tag{font-family:var(--ff-body);font-size:.82rem;font-style:italic;color:rgba(255,255,255,.65)}

/* NAV */
.nav{position:fixed;top:36px;left:0;right:0;z-index:200;background:rgba(24,13,18,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.nav__inner{display:flex;align-items:center;justify-content:space-between;height:62px;padding:0 2.5rem}
.nav__logo{display:flex;flex-direction:column;gap:1px;cursor:pointer}
.nav__logo-sub{font-family:var(--ff-ui);font-size:.56rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--rebel)}
.nav__logo-title{font-family:var(--ff-disp);font-size:1rem;color:var(--text);font-style:italic}
.nav__links{display:flex;align-items:center;gap:2rem;list-style:none}
.nav__link{font-family:var(--ff-ui);font-size:.66rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);background:none;border:none;transition:color .2s;cursor:pointer;position:relative}
.nav__link:hover,.nav__link.on{color:var(--text)}
.nav__link.on::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--rose-gold)}
.nav__cta{font-family:var(--ff-ui);font-size:.66rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--rebel);border:none;padding:.5rem 1.4rem;border-radius:2px;transition:background .2s,transform .2s;cursor:pointer}
.nav__cta:hover{background:var(--rebel-lt);transform:translateY(-1px)}
.dropdown{position:relative}
.dropdown__btn{font-family:var(--ff-ui);font-size:.66rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:color .2s;position:relative}
.dropdown__btn:hover,.dropdown__btn.on{color:var(--text)}
.dropdown__btn.on::after{content:'';position:absolute;bottom:-22px;left:0;right:0;height:1px;background:var(--rose-gold)}
.dropdown__chev{font-size:.55rem;transition:transform .2s;display:inline-block}
.dropdown__chev.open{transform:rotate(180deg)}
.dropdown__menu{position:absolute;top:calc(100% + 18px);left:0;background:rgba(24,13,18,.98);border:1px solid var(--border);border-radius:4px;min-width:160px;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .2s,transform .2s}
.dropdown__menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
.dropdown__item{display:block;width:100%;font-family:var(--ff-ui);font-size:.66rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:none;border:none;padding:.9rem 1.2rem;text-align:left;cursor:pointer;transition:all .15s;border-bottom:1px solid var(--border)}
.dropdown__item:last-child{border-bottom:none}
.dropdown__item:hover{background:rgba(150,45,73,.1);color:var(--text)}
.dropdown__item--water{color:var(--water-link) !important}
.dropdown__item--water:hover{background:rgba(90,127,168,.08) !important}
.dropdown__item--rebel{color:var(--rebel) !important}
.dropdown__item--rebel:hover{background:rgba(150,45,73,.1) !important}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--cream);transition:all .3s}
.mob-nav{display:none;flex-direction:column;background:rgba(24,13,18,.98);border-top:1px solid var(--border)}
.mob-nav.open{display:flex}
.mob-link{font-family:var(--ff-ui);font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:none;border:none;border-bottom:1px solid var(--border);padding:.9rem 2.5rem;text-align:left;transition:color .2s;cursor:pointer}
.mob-link:hover,.mob-link.on{color:var(--cream)}
.mob-link--rebel{color:var(--rebel) !important}

/* FLOAT BTN */
.float-swaps{position:fixed;bottom:2rem;right:2rem;z-index:250;background:var(--rebel);color:#fff;font-family:var(--ff-ui);font-size:.66rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;padding:.8rem 1.4rem;border-radius:2px;border:none;cursor:pointer;box-shadow:0 6px 24px var(--rebel-glow);animation:pulseFloat 3s ease-in-out infinite;transition:transform .2s,background .2s,box-shadow .2s}
.float-swaps:hover{transform:translateY(-3px) scale(1.03);background:var(--rebel-lt);box-shadow:0 10px 32px rgba(150,45,73,.55);animation:none}

/* BUTTONS */
.btn{display:inline-block;font-family:var(--ff-ui);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:.85rem 2rem;border-radius:2px;border:none;cursor:pointer;transition:all .25s var(--ease)}
.btn-rebel{background:var(--rebel);color:#fff}
.btn-rebel:hover{background:var(--rebel-lt);transform:translateY(-2px);box-shadow:0 10px 32px rgba(150,45,73,.35)}
.btn-gold{background:var(--gold);color:var(--near-black)}
.btn-gold:hover{background:var(--gold-lt);transform:translateY(-2px);box-shadow:0 10px 32px rgba(200,169,107,.28)}
.btn-ghost{background:transparent;color:var(--cream);border:1px solid rgba(244,237,227,.35)}
.btn-ghost:hover{border-color:var(--cream);background:rgba(244,237,227,.05);transform:translateY(-2px)}
.btn-teal{background:transparent;color:var(--foam);border:1px solid rgba(123,189,209,.35)}
.btn-teal:hover{border-color:var(--foam);background:rgba(123,189,209,.06);transform:translateX(4px)}
.btn-sm{padding:.5rem 1.1rem;font-size:.62rem}

/* CARDS */
.card{background:rgba(34,19,24,.8);border:1px solid var(--border);border-radius:4px;padding:2rem;transition:all .3s var(--ease)}
.card:hover{background:var(--card);border-color:rgba(150,45,73,.38);transform:translateY(-4px);box-shadow:0 18px 44px rgba(0,0,0,.35)}
.divider{display:flex;align-items:center;gap:1.5rem;margin:2.5rem 0}
.div-line{flex:1;height:1px;background:var(--border)}
.div-mark{color:var(--rose-gold);font-size:.75rem}
.quote{border-left:2px solid var(--rose-gold);padding:1.5rem 2rem;margin:2rem 0;background:rgba(150,45,73,.04)}
.quote p{font-family:var(--ff-body);font-size:1.3rem;font-style:italic;font-weight:300;color:var(--text-dim);line-height:1.6}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes waveMove{0%{transform:translateX(0)}100%{transform:translateX(25%)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes smashIn{0%{opacity:0;transform:scale(1.12) translateY(-8px);filter:blur(3px)}65%{transform:scale(.985) translateY(2px);opacity:1;filter:blur(0)}82%{transform:scale(1.008)}100%{transform:scale(1);opacity:1}}
@keyframes strikeAnim{0%{width:0}100%{width:100%}}
@keyframes pulseGlow{0%,100%{text-shadow:0 0 40px rgba(150,45,73,.4)}50%{text-shadow:0 0 80px rgba(150,45,73,.7)}}
@keyframes pulseFloat{0%,100%{box-shadow:0 6px 24px rgba(150,45,73,.38)}50%{box-shadow:0 6px 36px rgba(150,45,73,.65)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(9px)}}
.reveal{opacity:0;transform:translateY(30px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.reveal.vis{opacity:1;transform:translateY(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}
.page-in{animation:fadeIn .4s var(--ease) both}
.a1{animation:smashIn .8s var(--ease) .3s both}
.a2{animation:smashIn .8s var(--ease) .55s both}
.a3{animation:smashIn .8s var(--ease) .8s both}
.a4{animation:fadeUp .8s var(--ease) 1.2s both}

/* BRAND HERO */
.brand-hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:12rem 0 6rem;position:relative;overflow:hidden;background:var(--near-black)}
.brand-hero__bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 80% 50%,rgba(150,45,73,.14) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 10% 80%,rgba(92,24,40,.12) 0%,transparent 60%)}
.brand-hero__title{font-family:var(--ff-disp);font-size:clamp(4.5rem,12vw,10rem);font-weight:700;line-height:.9;color:var(--cream);display:block}
.brand-hero__title--red{color:var(--rebel);animation:pulseGlow 4s ease-in-out infinite}
.brand-hero__title--italic{font-style:italic;font-weight:400;font-size:clamp(3rem,8vw,7rem);color:rgba(243,236,226,.7);display:block}
.brand-hero__tag{font-family:var(--ff-ui);font-size:clamp(.75rem,1.5vw,1rem);font-weight:500;letter-spacing:.08em;color:rgba(243,236,226,.55);margin-top:2rem;max-width:560px;line-height:1.7;display:block}
.smash-word{position:relative;display:inline}
.smash-strike{position:absolute;left:0;top:48%;height:3px;background:var(--rebel);border-radius:2px;width:0;animation:strikeAnim .55s ease 2.2s forwards;display:block}
.hero-scroll{position:absolute;bottom:2.5rem;left:50%;z-index:2;animation:bounce 2s ease-in-out infinite,fadeIn 1s var(--ease) 2s both}
.scroll-line{width:1px;height:44px;background:linear-gradient(180deg,transparent,var(--rebel));margin:0 auto}

/* TICKER */
.ticker-wrap{background:var(--rebel);padding:.72rem 0;overflow:hidden}
.ticker-inner{display:flex;width:fit-content;animation:ticker 22s linear infinite}
.ticker-item{font-family:var(--ff-ui);font-size:.68rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.9);padding:0 2.5rem;white-space:nowrap;display:flex;align-items:center;gap:2.5rem}
.ticker-sep{opacity:.45;font-size:.55rem}

/* METHOD */
.method-section{background:linear-gradient(180deg,var(--near-black) 0%,var(--surface) 100%);padding:7rem 0;border-top:1px solid rgba(150,45,73,.2)}
.method-inner{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:start;gap:2rem}
.method-num{font-family:var(--ff-body);font-size:.82rem;font-style:italic;color:rgba(200,169,107,.45);margin-bottom:.6rem}
.method-verb{font-family:var(--ff-ui);font-size:clamp(2.2rem,5vw,4rem);font-weight:900;letter-spacing:-.02em;color:var(--cream);line-height:1;margin-bottom:1rem}
.method-verb--rebel{color:var(--rebel);text-shadow:0 0 40px rgba(150,45,73,.35)}
.method-desc{font-family:var(--ff-body);font-size:.98rem;color:var(--text-dim);line-height:1.75}
.method-arrow{font-family:var(--ff-ui);font-size:1.8rem;color:rgba(150,45,73,.4);align-self:center;padding-top:3.5rem;font-weight:300}

/* TOPICS */
.topics-section{background:var(--surface);padding:7rem 0}
.topic-grid{display:grid;grid-template-columns:1.6fr 1fr;grid-template-rows:1fr 1fr;gap:1.25rem;margin-top:3rem;min-height:420px}
.topic-card{border-radius:4px;padding:2.5rem;position:relative;overflow:hidden;transition:all .3s var(--ease)}
.topic-card--water{background:linear-gradient(135deg,var(--rebel-dk) 0%,#3D1828 100%);border:1px solid rgba(150,45,73,.4);grid-row:1/3;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}
.topic-card--water:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.4);border-color:var(--rebel)}
.topic-card--water::before{content:'';position:absolute;top:-30%;right:-10%;width:280px;height:280px;background:radial-gradient(circle,rgba(150,45,73,.15) 0%,transparent 70%);pointer-events:none}
.topic-card--soon{background:rgba(255,255,255,.02);border:1px solid rgba(237,224,230,.07);display:flex;flex-direction:column;justify-content:flex-end}
.topic-card--soon:hover{background:rgba(150,45,73,.04);border-color:rgba(150,45,73,.18)}
.topic-badge{font-family:var(--ff-ui);font-size:.56rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;display:inline-block;padding:.22rem .7rem;border-radius:2px;margin-bottom:1.25rem}
.badge-live{background:rgba(150,45,73,.25);color:var(--rose-lt);border:1px solid rgba(150,45,73,.4)}
.badge-soon{background:rgba(255,255,255,.04);color:rgba(237,224,230,.3);border:1px solid rgba(237,224,230,.08)}
.topic-title{font-family:var(--ff-disp);font-size:clamp(2.3rem,4.6vw,3.4rem);color:var(--cream);margin-bottom:.75rem}
.topic-desc{font-family:var(--ff-body);font-size:1.17rem;color:var(--text);line-height:1.75;margin-bottom:2rem;max-width:380px}
.topic-actions{display:flex;gap:.75rem;flex-wrap:wrap}
.topic-soon-title{font-family:var(--ff-disp);font-size:1.6rem;color:rgba(243,236,226,.3);margin-bottom:.35rem}
.topic-soon-sub{font-family:var(--ff-body);font-size:.9rem;color:rgba(243,236,226,.18);font-style:italic}

/* PAGE HEROES */
.page-hero{min-height:44vh;display:flex;align-items:flex-end;padding:10rem 0 4rem;position:relative;overflow:hidden}
.page-hero--water{background:linear-gradient(180deg,var(--near-black) 0%,var(--ink) 50%,#0a2230 100%)}
.page-hero--rebel{background:linear-gradient(160deg,var(--near-black) 0%,#1a0810 100%)}
.page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 25% 55%,rgba(29,80,110,.25) 0%,transparent 70%)}
.page-hero--rebel::before{background:radial-gradient(ellipse 50% 60% at 80% 40%,rgba(150,45,73,.18) 0%,transparent 70%)}
.water-badge{display:inline-flex;align-items:center;gap:.6rem;font-family:var(--ff-ui);font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--foam);background:rgba(45,122,150,.15);border:1px solid rgba(45,122,150,.3);padding:.3rem .85rem;border-radius:2px;margin-bottom:1rem}
.water-dot{width:6px;height:6px;border-radius:50%;background:var(--foam);display:inline-block}

/* ABOUT */
.about-teaser{background:var(--near-black);padding:7rem 0;border-top:1px solid rgba(150,45,73,.15)}
.about-teaser-grid{display:grid;grid-template-columns:1fr 1.5fr;gap:5rem;align-items:center}
.about-photo-sm{aspect-ratio:3/4;background:linear-gradient(135deg,var(--rebel-dk),var(--elevated));border-radius:4px;overflow:hidden;border:1px solid var(--border);max-width:280px}
.about-photo-sm img{width:100%;height:100%;object-fit:cover;object-position:center top}
.photo-placeholder-sm{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--ff-disp);font-size:5rem;color:var(--mauve);font-style:italic}
.about-grid{display:grid;grid-template-columns:1fr 1.7fr;gap:5rem;align-items:start}
.about-sticky{position:sticky;top:110px}
.photo-frame{aspect-ratio:3/4;background:linear-gradient(135deg,var(--rebel-dk),var(--elevated));border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.photo-frame img{width:100%;height:100%;object-fit:cover;object-position:center top}
.photo-placeholder{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--ff-disp);font-size:6rem;color:var(--mauve);font-style:italic}
.photo-cap{margin-top:1rem;text-align:center;font-family:var(--ff-ui);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--rose-gold)}
.values-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2rem}
.value-item{padding:1.25rem;border:1px solid var(--border);border-radius:4px;background:rgba(150,45,73,.06)}
.value-item h4{font-family:var(--ff-disp);font-size:1.22rem;color:var(--text);margin-bottom:.4rem}
.value-item p{font-family:var(--ff-body);font-size:1.17rem;color:var(--text);line-height:1.6}

/* SWAPS */
.swap-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:4px;overflow:hidden;flex-wrap:wrap;margin-bottom:2rem}
.s-tab{flex:1;font-family:var(--ff-ui);font-size:.63rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1rem;background:none;border:none;color:var(--text-dim);transition:all .2s;cursor:pointer;border-right:1px solid var(--border);white-space:nowrap}
.s-tab:last-child{border-right:none}
.s-tab:hover{background:rgba(17,45,64,.3);color:var(--cream)}
.s-tab.on{background:rgba(45,122,150,.2);color:var(--cream)}
.src-list{display:flex;flex-direction:column;gap:.85rem}
.src-item{display:flex;align-items:center;gap:1.5rem;padding:1.2rem 1.5rem;background:rgba(17,45,64,.3);border:1px solid var(--border);border-radius:4px;transition:all .22s}
.src-item:hover{background:rgba(17,45,64,.5);border-color:rgba(45,122,150,.4)}
.src-rank{font-family:var(--ff-disp);font-size:2.5rem;color:rgba(200,169,107,.22);min-width:3rem;font-style:italic;line-height:1}
.src-info{flex:1}
.src-name{font-family:var(--ff-disp);font-size:1.38rem;color:var(--cream);margin-bottom:.25rem}
.src-desc{font-family:var(--ff-body);font-size:1.17rem;color:var(--text);line-height:1.6}
.badge{font-family:var(--ff-ui);font-size:.58rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:.22rem .65rem;border-radius:2px}
.b-best{background:rgba(45,158,106,.18);color:#6bcea0;border:1px solid rgba(45,158,106,.28)}
.b-good{background:rgba(45,122,150,.18);color:var(--foam);border:1px solid var(--border)}
.b-caution{background:rgba(200,169,107,.1);color:var(--gold);border:1px solid rgba(200,169,107,.28)}
.b-avoid{background:rgba(224,82,82,.1);color:#e08888;border:1px solid rgba(224,82,82,.2)}
.tbl-wrap{overflow-x:auto;border-radius:4px;border:1px solid var(--border)}
.dtbl{width:100%;border-collapse:collapse;font-size:.93rem}
.dtbl th{font-family:var(--ff-ui);font-size:.58rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);padding:.95rem 1.2rem;text-align:left;background:rgba(12,33,48,.8);border-bottom:1px solid var(--border);white-space:nowrap}
.dtbl td{padding:.88rem 1.2rem;border-bottom:1px solid rgba(45,122,150,.08);color:var(--text);vertical-align:top;line-height:1.55;font-size:1.05rem}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr:hover td{background:rgba(17,45,64,.2)}

function useReveal() {
  useEffect(() => {
    const t = setTimeout(() => {
      const els = document.querySelectorAll('.reveal:not(.vis)');
      if (!els.length) return;
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); obs.unobserve(e.target); } });
      }, { threshold: 0.1 });
      els.forEach(el => obs.observe(el));
      return () => obs.disconnect();
    }, 100);
    return () => clearTimeout(t);
  });
}

/* ── QUIZ ── */
function DehydrationQuiz({ navigate }) {
  const [step,setStep] = useState(0);
  const [score,setScore] = useState(0);
  const [done,setDone] = useState(false);
  function pick(p) { const ns=score+p; if(step<QUIZ_QS.length-1){setScore(ns);setStep(step+1);}else{setScore(ns);setDone(true);} }
  function reset(){setStep(0);setScore(0);setDone(false);}
  const res = done ? QUIZ_RES.find(r=>score>=r.min&&score<=r.max)||QUIZ_RES[2] : null;
  return (
    <section className="quiz-wrap" style={{padding:'6rem 0'}}>
      <div className="quiz-inner">
        <div style={{textAlign:'center',marginBottom:'3.5rem'}}>
          <div className="label" style={{marginBottom:'.75rem'}}>Cellular Hydration Check</div>
          <h2 style={{fontSize:'clamp(2rem,4vw,3rem)',color:'var(--cream)',fontStyle:'italic'}}>Are your cells truly hydrated?</h2>
          <p style={{color:'var(--text-dim)',marginTop:'.75rem',fontStyle:'italic'}}>6 questions · 2 minutes · No email required</p>
        </div>
        {!done ? (
          <div>
            <div className="q-progress">{QUIZ_QS.map((_,i)=><div key={i} className="q-prog-bar"><div className="q-prog-fill" style={{width:i<step?'100%':i===step?'50%':'0%'}}/></div>)}</div>
            <div style={{fontFamily:'var(--ff-ui)',fontSize:'.62rem',color:'var(--text-soft)',marginBottom:'.75rem',letterSpacing:'.1em'}}>{step+1} / {QUIZ_QS.length}</div>
            <div key={step} className="q-text">{QUIZ_QS[step].text}</div>
            <div className="q-opts">{QUIZ_QS[step].opts.map((o,i)=>(
              <button key={i} className="q-opt" onClick={()=>pick(o.p)}><span className="q-letter">{String.fromCharCode(65+i)}</span><span className="q-opt-text">{o.t}</span></button>
            ))}</div>
            {step>0&&<button onClick={()=>setStep(step-1)} style={{marginTop:'1.25rem',fontFamily:'var(--ff-ui)',fontSize:'.65rem',letterSpacing:'.1em',color:'var(--text-soft)',background:'none',border:'none',cursor:'pointer'}}>← Back</button>}
          </div>
        ) : (
          <div className="q-result">
            <div className="q-score">{score}/{QUIZ_QS.length*2}</div>
            <div className="q-level">{res.level}</div>
            <div className="q-rtitle">{res.title}</div>
            <p className="q-rmsg">{res.msg}</p>
            <div className="q-ract">
              <button className="btn btn-rebel" onClick={()=>navigate(res.cta)}>{res.ctaLabel}</button>
              <button className="btn btn-ghost" onClick={reset}>Retake</button>
            </div>
          </div>
        )}
      </div>
    </section>
  );
}

/* ── APP ── */
function App() {
  const getPage = () => { const h = window.location.hash.replace('#',''); return ['home','principles','swaps','about','work','contact'].includes(h)?h:'home'; };
  const [page, setPage] = useState(getPage);
  const [scrollTarget, setScrollTarget] = useState(null);
  function navigate(p, section=null) { setPage(p); setScrollTarget(section); window.location.hash=p; window.scrollTo({top:0,behavior:'smooth'}); }
  useEffect(() => {
    const h = () => { const p=window.location.hash.replace('#',''); if(['home','principles','swaps','about','work','contact'].includes(p)) setPage(p); };
    window.addEventListener('hashchange',h);
    return ()=>window.removeEventListener('hashchange',h);
  },[]);
  return (
    <div>
      <BrandBar/>
      <Nav page={page} navigate={navigate}/>
      <main style={{paddingTop:'98px'}}>
        {page==='home'       && <HomePage navigate={navigate}/>}
        {page==='about'      && <AboutPage navigate={navigate}/>}
        {page==='principles' && <PrinciplesPage navigate={navigate}/>}
        {page==='swaps'      && <SwapsPage navigate={navigate} scrollTarget={scrollTarget}/>}
        {page==='work'       && <WorkPage navigate={navigate}/>}
        {page==='contact'    && <ContactPage navigate={navigate}/>}
      </main>
      <Footer navigate={navigate}/>
      <FloatingSwapsBtn navigate={navigate}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
